name: PR check

on:
  pull_request:
    branches: [main]

jobs:
  package-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gettext \
            libglib2.0-bin \
            zip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install shexli
        run: pip install shexli

      - name: Build extension package
        run: bash package.sh

      - name: Run shexli (human-readable)
        run: shexli --format text build/gnomefootball@carlosjdelgado.shell-extension.zip

      - name: Run shexli (gate on findings)
        run: |
          shexli --format json build/gnomefootball@carlosjdelgado.shell-extension.zip > shexli.json
          status=$(jq -r '.summary.status' shexli.json)
          count=$(jq -r '.summary.finding_count' shexli.json)
          echo "shexli status=${status}, finding_count=${count}"
          if [ "${status}" != "clean" ] || [ "${count}" != "0" ]; then
            echo "::error::shexli reported ${count} finding(s); blocking merge."
            jq '.findings' shexli.json
            exit 1
          fi

  unit-tests:
    runs-on: ubuntu-latest
    # memory backend avoids needing a D-Bus session; the desktop schema below is
    # still required so Gio.Settings('org.gnome.desktop.interface') resolves
    # (theme.isDarkTheme), otherwise GLib aborts the process.
    env:
      GSETTINGS_BACKEND: memory
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gjs and desktop schemas
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gjs \
            gir1.2-soup-3.0 \
            gsettings-desktop-schemas \
            libglib2.0-bin
          sudo glib-compile-schemas /usr/share/glib-2.0/schemas

      - name: Run unit tests
        run: ./tests/unit/run.sh
